version: "3.9"

services:
  cti-dashboard:
    build: .
    ports:
      - "5000:5000"
    env_file:
      - .env
    volumes:
      - ./reports:/app/reports
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
